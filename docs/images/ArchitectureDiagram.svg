<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120" role="img" aria-labelledby="title desc">
  <title id="title">Arquitetura do Gerenciador de Planos de Aula</title>
  <desc id="desc">Diagrama visual da arquitetura real do projeto com frontend React Vite, backend Flask, Smart Assist IA, SQLite, Docker Compose e GitHub Actions.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .cluster { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .cluster-title { font: 700 24px Arial, sans-serif; fill: #0f172a; }
      .box { stroke-width: 1.5; rx: 12; }
      .actor { fill: #fef3c7; stroke: #d97706; }
      .front { fill: #e0f2fe; stroke: #0284c7; }
      .back { fill: #e0f2fe; stroke: #2563eb; }
      .ai { fill: #fef3c7; stroke: #d97706; }
      .db { fill: #dcfce7; stroke: #16a34a; }
      .ops { fill: #f1f5f9; stroke: #64748b; }
      .text { font: 600 17px Arial, sans-serif; fill: #0f172a; }
      .small { font: 500 14px Arial, sans-serif; fill: #334155; }
      .tiny { font: 500 12px Arial, sans-serif; fill: #475569; }
      .line { fill: none; stroke: #64748b; stroke-width: 2.2; marker-end: url(#arrow); }
      .softline { fill: none; stroke: #94a3b8; stroke-width: 1.8; marker-end: url(#arrow); }
      .dash { fill: none; stroke: #94a3b8; stroke-width: 1.8; stroke-dasharray: 7 7; marker-end: url(#arrow); }
      .label { font: 600 13px Arial, sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1120"/>
  <text x="80" y="62" font-family="Arial, sans-serif" font-size="34" font-weight="800" fill="#0f172a">Arquitetura do Gerenciador de Planos de Aula</text>
  <text x="80" y="92" font-family="Arial, sans-serif" font-size="18" fill="#475569">Fluxo implementado: React/Vite -> Flask API -> Services -> Repository -> SQLAlchemy -> SQLite, com Smart Assist, Swagger, logs, Docker e CI.</text>

  <!-- Actors -->
  <rect class="box actor" x="70" y="185" width="170" height="70"/>
  <text class="text" x="155" y="214" text-anchor="middle">Usuario</text>
  <text class="small" x="155" y="238" text-anchor="middle">Professor</text>

  <rect class="box actor" x="70" y="610" width="170" height="70"/>
  <text class="text" x="155" y="639" text-anchor="middle">Avaliador</text>
  <text class="small" x="155" y="663" text-anchor="middle">tecnico</text>

  <!-- Frontend cluster -->
  <rect class="cluster" x="290" y="130" width="360" height="310"/>
  <text class="cluster-title" x="320" y="168">Frontend React + Vite</text>
  <rect class="box front" x="330" y="195" width="280" height="58"/>
  <text class="text" x="470" y="218" text-anchor="middle">App.jsx</text>
  <text class="small" x="470" y="238" text-anchor="middle">React Router</text>
  <rect class="box front" x="330" y="270" width="280" height="70"/>
  <text class="text" x="470" y="295" text-anchor="middle">Paginas</text>
  <text class="small" x="470" y="316" text-anchor="middle">listagem, criacao, edicao</text>
  <rect class="box front" x="330" y="355" width="280" height="70"/>
  <text class="text" x="470" y="380" text-anchor="middle">Componentes</text>
  <text class="small" x="470" y="401" text-anchor="middle">form, filtros, lista, paginacao</text>

  <rect class="box front" x="710" y="255" width="260" height="82"/>
  <text class="text" x="840" y="282" text-anchor="middle">Services Axios</text>
  <text class="small" x="840" y="305" text-anchor="middle">api.js</text>
  <text class="small" x="840" y="325" text-anchor="middle">lessonPlanService / aiService</text>

  <!-- Backend cluster -->
  <rect class="cluster" x="1040" y="120" width="470" height="500"/>
  <text class="cluster-title" x="1070" y="158">Backend Flask API REST</text>
  <rect class="box back" x="1080" y="185" width="180" height="62"/>
  <text class="text" x="1170" y="209" text-anchor="middle">Routes</text>
  <text class="small" x="1170" y="230" text-anchor="middle">controllers / blueprints</text>
  <rect class="box back" x="1290" y="185" width="180" height="62"/>
  <text class="text" x="1380" y="209" text-anchor="middle">Endpoints</text>
  <text class="small" x="1380" y="230" text-anchor="middle">CRUD, IA, docs, health</text>

  <rect class="box back" x="1080" y="280" width="180" height="62"/>
  <text class="text" x="1170" y="304" text-anchor="middle">Schemas</text>
  <text class="small" x="1170" y="325" text-anchor="middle">Pydantic</text>
  <rect class="box back" x="1080" y="375" width="180" height="62"/>
  <text class="text" x="1170" y="399" text-anchor="middle">Services</text>
  <text class="small" x="1170" y="420" text-anchor="middle">lesson_plan / ai</text>
  <rect class="box back" x="1080" y="470" width="180" height="62"/>
  <text class="text" x="1170" y="494" text-anchor="middle">Repository</text>
  <text class="small" x="1170" y="515" text-anchor="middle">lesson_plan_repository</text>

  <rect class="box back" x="1290" y="375" width="180" height="62"/>
  <text class="text" x="1380" y="399" text-anchor="middle">Swagger Docs</text>
  <text class="small" x="1380" y="420" text-anchor="middle">/docs</text>
  <rect class="box back" x="1290" y="470" width="180" height="62"/>
  <text class="text" x="1380" y="494" text-anchor="middle">Observabilidade</text>
  <text class="small" x="1380" y="515" text-anchor="middle">/health + logs</text>

  <!-- Database cluster -->
  <rect class="cluster" x="1040" y="690" width="470" height="170"/>
  <text class="cluster-title" x="1070" y="728">Banco</text>
  <rect class="box db" x="1080" y="755" width="180" height="64"/>
  <text class="text" x="1170" y="780" text-anchor="middle">LessonPlan</text>
  <text class="small" x="1170" y="801" text-anchor="middle">Model SQLAlchemy</text>
  <rect class="box db" x="1290" y="755" width="180" height="64"/>
  <text class="text" x="1380" y="780" text-anchor="middle">SQLite</text>
  <text class="small" x="1380" y="801" text-anchor="middle">tabela lesson_plans</text>

  <!-- AI cluster -->
  <rect class="cluster" x="650" y="500" width="340" height="270"/>
  <text class="cluster-title" x="680" y="538">Smart Assist IA</text>
  <rect class="box ai" x="710" y="565" width="220" height="56"/>
  <text class="text" x="820" y="589" text-anchor="middle">ai_service</text>
  <text class="small" x="820" y="609" text-anchor="middle">POST /ai/recommendations</text>
  <rect class="box ai" x="690" y="650" width="130" height="52"/>
  <text class="text" x="755" y="682" text-anchor="middle">OpenAI</text>
  <rect class="box ai" x="840" y="650" width="130" height="52"/>
  <text class="text" x="905" y="682" text-anchor="middle">Gemini</text>
  <rect class="box ai" x="735" y="720" width="170" height="40"/>
  <text class="small" x="820" y="745" text-anchor="middle">Fallback mock source="mock"</text>

  <!-- DevOps cluster -->
  <rect class="cluster" x="290" y="830" width="700" height="205"/>
  <text class="cluster-title" x="320" y="868">DevOps / Qualidade</text>
  <rect class="box ops" x="330" y="895" width="180" height="58"/>
  <text class="text" x="420" y="918" text-anchor="middle">Docker Compose</text>
  <text class="small" x="420" y="938" text-anchor="middle">frontend + backend</text>
  <rect class="box ops" x="540" y="895" width="170" height="58"/>
  <text class="text" x="625" y="918" text-anchor="middle">Volume SQLite</text>
  <text class="small" x="625" y="938" text-anchor="middle">backend_data</text>
  <rect class="box ops" x="750" y="895" width="200" height="58"/>
  <text class="text" x="850" y="918" text-anchor="middle">GitHub Actions</text>
  <text class="small" x="850" y="938" text-anchor="middle">CI</text>
  <rect class="box ops" x="520" y="970" width="210" height="45"/>
  <text class="small" x="625" y="998" text-anchor="middle">Backend: Ruff + Pytest</text>
  <rect class="box ops" x="750" y="970" width="200" height="45"/>
  <text class="small" x="850" y="998" text-anchor="middle">Frontend: lint + build</text>

  <!-- Main flow -->
  <path class="line" d="M240 220 C270 220 285 220 330 220"/>
  <path class="softline" d="M470 253 L470 270"/>
  <path class="softline" d="M470 340 L470 355"/>
  <path class="line" d="M610 390 C655 390 665 296 710 296"/>
  <path class="line" d="M970 296 C1010 296 1030 216 1080 216"/>
  <path class="softline" d="M1260 216 L1290 216"/>
  <path class="softline" d="M1170 247 L1170 280"/>
  <path class="softline" d="M1170 342 L1170 375"/>
  <path class="softline" d="M1170 437 L1170 470"/>
  <path class="line" d="M1170 532 L1170 755"/>
  <path class="softline" d="M1260 787 L1290 787"/>

  <!-- AI flow -->
  <path class="line" d="M710 337 C665 405 674 520 710 590"/>
  <text class="label" x="575" y="488">POST /ai/recommendations</text>
  <path class="softline" d="M820 621 L755 650"/>
  <path class="softline" d="M820 621 L905 650"/>
  <path class="dash" d="M820 621 L820 720"/>
  <text class="tiny" x="832" y="700">erro / sem chave</text>
  <path class="line" d="M930 592 C1000 560 1030 440 1080 406"/>

  <!-- Docs and health -->
  <path class="line" d="M240 645 C690 645 805 406 1290 406"/>
  <text class="label" x="370" y="635">GET /docs Swagger</text>
  <path class="line" d="M240 655 C730 700 850 515 1290 501"/>
  <text class="label" x="370" y="690">GET /health</text>
  <path class="softline" d="M1260 406 L1290 406"/>
  <path class="softline" d="M1260 406 C1275 430 1275 475 1290 501"/>

  <!-- Observability and DevOps -->
  <path class="softline" d="M1260 406 C1290 430 1295 475 1290 501"/>
  <path class="dash" d="M510 924 L540 924"/>
  <path class="dash" d="M710 924 L750 924"/>
  <path class="dash" d="M850 953 L850 970"/>
  <path class="dash" d="M750 924 C710 910 700 820 1290 805"/>
  <text class="tiny" x="1000" y="850">persistencia em container</text>
</svg>
